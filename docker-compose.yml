services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        # image: ghcr.io/bta-adinusa/tailadmin-laravel:latest
        image: davidwah/tailadmin:latest
        ports:
            - "8090:8090"
        environment:
            APP_ENV: production
            APP_DEBUG: "false"
            APP_URL: http://localhost:8090
            APP_KEY: ${APP_KEY:-}
            LOG_CHANNEL: stderr
            LOG_LEVEL: info
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: tailadmin
            DB_USERNAME: tailadmin
            DB_PASSWORD: tailadmin
            RUN_MIGRATIONS: "true"
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: tailadmin
            MYSQL_USER: tailadmin
            MYSQL_PASSWORD: tailadmin
        ports:
            - "3306:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s
        restart: unless-stopped

volumes:
    mysql-data:
